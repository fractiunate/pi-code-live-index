backend: "auto" # auto|lexical|cocoindex; PI_CODE_INDEX_BACKEND overrides this
table_name: "code_embeddings"
chunk_size: 1000
min_chunk_size: 120
chunk_overlap: 120
schema_name: null # defaults to global schema_name
table_prefix: null # defaults to global table_prefix
branch_mode: "current"
compatibility_view: true
enable_symbols: false # set true with chunk_strategy: hybrid and ast_languages: [python] to enable symbol tools and symbol-scope find_similar_code
enable_references: false
enable_test_links: false
chunk_strategy: "recursive" # recursive|ast|hybrid; ast/hybrid function chunks improve find_similar_code ranking when CocoIndex is enabled
ast_languages: null # e.g. ["python"]
max_ast_chunk_bytes: 12000
max_result_code_bytes: 12000
ast_context_lines: 3
symbol_languages: null # defaults to ast_languages; currently python only
symbol_kinds: null
symbol_embedding_model: null
max_symbol_docstring_bytes: 4000
max_symbol_signature_bytes: 1000
include:
  - "**/*.py"
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.rs"
  - "**/*.go"
  - "**/*.java"
  - "**/*.md"
  - "**/*.mdx"
  - "**/*.toml"
  - "**/*.json"
  - "**/*.yaml"
  - "**/*.yml"
exclude:
  - "**/.*"
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/target/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/__pycache__/**"
  - "**/.venv/**"
  - "**/.pi-code-index/**"
