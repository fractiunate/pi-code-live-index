services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pi-code-index-postgres
    environment:
      POSTGRES_USER: ${PI_CODE_INDEX_POSTGRES_USER:-cocoindex}
      POSTGRES_PASSWORD: ${PI_CODE_INDEX_POSTGRES_PASSWORD:-cocoindex}
      POSTGRES_DB: ${PI_CODE_INDEX_POSTGRES_DB:-cocoindex}
    ports:
      - "${PI_CODE_INDEX_POSTGRES_PORT:-5432}:5432"
    volumes:
      - pi-code-index-postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  pi-code-index-postgres-data:
